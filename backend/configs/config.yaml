mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: "123456"
  dbname: agenthub
  charset: utf8mb4

jwt:
  secret: agenthub-demo-secret
  expire_hours: 24

agentend:
  host: http://localhost
  port: 8001

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

admin:
  # Plaintext password. For production, replace with bcrypt hash (prefix $2a$ or $2b$).
  # Generate: htpasswd -nbBC 10 "" "your-password" | tr -d ':\n' | sed 's/$2y/$2a/'
  password: "123456"

qiniu:
  bucket: "agenthub"
  domain: "http://tfj4mvkda.hd-bkt.clouddn.com"
  region: z0    # z0=华东 z1=华北 z2=华南 na0=北美

storage:
  type: ""          # "qiniu" | "local" | "" 自动检测（有 QINIU_ACCESS_KEY 则七牛云，否则本地）
  local:
    dir: "./uploads"
    url_prefix: "http://localhost:8080/uploads"

cors:
  allow_origins:
    - "http://localhost:5173"
