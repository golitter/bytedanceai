<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestrator Group Chat Demo</title>
<style>
  :root {
    --background: #0A0B0E;
    --foreground: #E8EBF0;
    --card: #1A1D24;
    --card-foreground: #E8EBF0;
    --primary: #6366F1;
    --primary-foreground: #E8EBF0;
    --secondary: #22262F;
    --secondary-foreground: #E8EBF0;
    --muted: #22262F;
    --muted-foreground: #8B91A0;
    --accent: #22262F;
    --border: rgba(255,255,255,0.06);
    --sidebar: #111318;
    --sidebar-foreground: #E8EBF0;
    --text-primary: #E8EBF0;
    --text-secondary: #8B91A0;
    --text-tertiary: #5A6070;
    --primary-soft: rgba(99, 102, 241, 0.08);
    --primary-border: rgba(99, 102, 241, 0.15);
    --agent-claude: #DA7756;
    --agent-opencode: #10B981;
    --agent-orchestrator: #EAB308;
    --agent-codex: #6366F1;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Geist Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--background);
    color: var(--foreground);
    height: 100vh;
    display: flex;
    overflow: hidden;
    letter-spacing: -0.01em;
  }

  /* ===== Column 1: Icon Sidebar (56px) ===== */
  .icon-sidebar {
    width: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-right: 1px solid var(--border);
    background: var(--sidebar);
    padding: 12px 0;
    gap: 4px;
    flex-shrink: 0;
  }
  .user-avatar {
    width: 36px; height: 36px;
    border-radius: var(--radius);
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: white;
    margin-bottom: 16px; cursor: pointer;
    position: relative;
  }
  .user-avatar .status-dot {
    position: absolute; right: -2px; bottom: -2px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #10B981; border: 2px solid var(--sidebar);
  }
  .nav-icon {
    width: 44px; height: 44px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: var(--radius); cursor: pointer;
    color: var(--muted-foreground); gap: 2px;
    transition: all 0.12s ease-out;
  }
  .nav-icon:hover { background: var(--accent); color: var(--foreground); }
  .nav-icon.active { background: var(--primary); color: white; }
  .nav-icon .icon { font-size: 18px; line-height: 1; }
  .nav-icon .label { font-size: 9px; line-height: 1; }

  /* ===== Column 2: Conversation List (280px) ===== */
  .conv-list {
    width: 280px;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--sidebar);
    flex-shrink: 0;
  }
  .conv-header {
    padding: 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .conv-header h3 { font-size: 14px; font-weight: 600; }
  .new-chat-btn {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--primary); border: none; color: white;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .new-chat-btn:hover { opacity: 0.85; }
  .conv-search { padding: 8px 12px; }
  .conv-search input {
    width: 100%; padding: 6px 12px; border-radius: 8px;
    background: var(--accent); border: none; color: var(--foreground);
    font-size: 12px; outline: none;
  }
  .conv-search input::placeholder { color: var(--text-tertiary); }
  .conv-scroll { flex: 1; overflow-y: auto; }
  .conv-scroll::-webkit-scrollbar { width: 4px; }
  .conv-scroll::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
  .conv-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.12s ease-out;
  }
  .conv-item:hover { background: var(--accent); }
  .conv-item.active { background: var(--accent); border-left-color: var(--primary); }
  .conv-avatar {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: white; flex-shrink: 0;
  }
  .conv-info { flex: 1; min-width: 0; }
  .conv-row { display: flex; justify-content: space-between; align-items: center; }
  .conv-title {
    font-size: 13px; font-weight: 500; color: var(--foreground);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-time { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }
  .conv-preview {
    font-size: 12px; color: var(--text-tertiary); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-members { display: flex; gap: 2px; margin-top: 4px; }
  .member-dot {
    width: 16px; height: 16px; border-radius: 50%; font-size: 8px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; color: white;
  }

  /* ===== Column 3: Chat Area ===== */
  .chat-area {
    flex: 1; display: flex; flex-direction: column;
    background: var(--background);
  }
  .chat-header {
    padding: 12px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .chat-header h4 { font-size: 15px; font-weight: 600; }
  .agent-badges { display: flex; gap: 6px; }
  .agent-badge {
    padding: 2px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 500;
  }
  .badge-orchestrator { background: rgba(234,179,8,0.1); color: var(--agent-orchestrator); }
  .badge-claude { background: rgba(218,119,86,0.1); color: var(--agent-claude); }
  .badge-opencode { background: rgba(16,185,129,0.1); color: var(--agent-opencode); }
  #headerStatus { font-size: 12px; color: var(--text-secondary); }

  /* ===== Messages ===== */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

  .msg { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: white;
    margin-top: 2px;
  }
  .msg-body { display: flex; flex-direction: column; max-width: 100%; }
  .msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .msg-name { font-size: 12px; font-weight: 600; }
  .msg-time { font-size: 10px; color: var(--text-tertiary); }
  .msg-content {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.7; position: relative;
    word-break: break-word;
  }
  .msg.user .msg-content {
    background: var(--primary-soft);
    border: 1px solid var(--primary-border);
  }
  .msg.agent .msg-content {
    background: var(--card);
    border: 1px solid var(--border);
  }
  .msg.agent .msg-content::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .msg.agent.orchestrator .msg-content::before { background: var(--agent-orchestrator); }
  .msg.agent.claude .msg-content::before { background: var(--agent-claude); }
  .msg.agent.opencode .msg-content::before { background: var(--agent-opencode); }

  .msg-name.orchestrator { color: var(--agent-orchestrator); }
  .msg-name.claude { color: var(--agent-claude); }
  .msg-name.opencode { color: var(--agent-opencode); }

  .msg-actions {
    display: flex; gap: 4px; margin-top: 4px;
    opacity: 0; transition: opacity 0.2s;
  }
  .msg:hover .msg-actions { opacity: 1; }
  .msg-action-btn {
    background: var(--muted); border: none; border-radius: 6px;
    padding: 2px 8px; font-size: 11px; cursor: pointer;
    color: var(--text-secondary);
  }
  .msg-action-btn:hover { background: var(--accent); color: var(--foreground); }

  .mention { padding: 1px 6px; border-radius: 4px; font-weight: 500; }
  .mention-orchestrator { background: rgba(234,179,8,0.1); color: var(--agent-orchestrator); }
  .mention-claude { background: rgba(218,119,86,0.1); color: var(--agent-claude); }
  .mention-opencode { background: rgba(16,185,129,0.1); color: var(--agent-opencode); }

  .runtime-status {
    padding: 3px 10px; border-radius: 8px; font-size: 11px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .runtime-status.planning { background: rgba(234,179,8,0.1); color: var(--agent-orchestrator); }
  .runtime-status.coordinating { background: rgba(234,179,8,0.15); color: #FBBF24; }
  .runtime-status.executing { background: rgba(218,119,86,0.1); color: var(--agent-claude); }
  .runtime-status.completed { background: rgba(16,185,129,0.1); color: var(--agent-opencode); }
  .runtime-status.merging { background: rgba(99,102,241,0.1); color: var(--primary); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status-dot.pulse { animation: statusPulse 1.5s ease-in-out infinite; }
  .status-dot.spin {
    width: 10px; height: 10px; border: 2px solid currentColor;
    border-top-color: transparent; background: none; border-radius: 50%;
    animation: statusSpin 1.5s linear infinite;
  }

  .time-divider { text-align: center; font-size: 11px; color: var(--text-tertiary); padding: 8px 0; }

  /* ===== Coordination Channel ===== */
  .coord-channel {
    margin: 4px 0;
    border: 1px solid rgba(234,179,8,0.15);
    border-radius: var(--radius); overflow: hidden;
    background: rgba(234,179,8,0.03);
  }
  .coord-header {
    padding: 10px 14px; display: flex; justify-content: space-between;
    align-items: center; cursor: pointer; user-select: none;
  }
  .coord-header:hover { background: rgba(234,179,8,0.05); }
  .coord-title {
    font-size: 13px; color: var(--agent-orchestrator); font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .coord-toggle { font-size: 11px; color: var(--text-tertiary); }
  .coord-body {
    padding: 0 14px; max-height: 0; overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s ease;
  }
  .coord-body.open {
    max-height: 800px; padding: 8px 14px 12px;
    border-top: 1px solid rgba(234,179,8,0.1);
  }
  .coord-round { margin-bottom: 10px; }
  .coord-round-label {
    font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px;
    padding-bottom: 4px; border-bottom: 1px dashed rgba(234,179,8,0.15);
  }
  .coord-msg {
    padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5;
    margin-bottom: 6px; background: var(--card); border: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }
  .coord-from { font-weight: 600; font-size: 12px; }
  .coord-from.orchestrator { color: var(--agent-orchestrator); }
  .coord-from.claude { color: var(--agent-claude); }
  .coord-from.opencode { color: var(--agent-opencode); }
  .coord-arrow { color: var(--text-tertiary); margin: 0 4px; }
  .coord-typing {
    font-size: 12px; color: var(--text-secondary); padding: 6px 12px;
    animation: fadeIn 0.3s ease;
  }
  .coord-typing .dots span { animation: statusPulse 1s infinite; display: inline-block; }
  .coord-typing .dots span:nth-child(2) { animation-delay: 0.2s; }
  .coord-typing .dots span:nth-child(3) { animation-delay: 0.4s; }

  .plan-card {
    background: rgba(234,179,8,0.03); border: 1px solid rgba(234,179,8,0.12);
    border-radius: var(--radius); padding: 12px; margin-top: 4px;
  }
  .plan-card-title { font-size: 13px; font-weight: 600; color: var(--agent-orchestrator); margin-bottom: 8px; }
  .plan-tasks { display: flex; flex-direction: column; gap: 6px; }
  .plan-task {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 8px; background: var(--card); font-size: 13px;
  }
  .plan-task-status {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 10px;
  }
  .plan-task-status.done { background: rgba(16,185,129,0.15); color: var(--agent-opencode); }
  .plan-task-status.running { background: rgba(218,119,86,0.15); color: var(--agent-claude); }
  .plan-task-status.pending { background: var(--muted); color: var(--text-tertiary); }
  .plan-task-title { flex: 1; color: var(--text-secondary); }

  .tool-card {
    background: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; margin: 4px 0; font-size: 13px;
  }
  .tool-card-header {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;
  }
  .tool-card-cmd {
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: var(--secondary); padding: 2px 6px; border-radius: 4px;
    font-size: 12px; color: var(--foreground);
  }

  .chat-input-area {
    padding: 12px 20px;
    background: var(--card);
    border-top: 1px solid var(--border);
  }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-input {
    flex: 1; padding: 12px 14px; border: none; border-radius: 8px;
    font-size: 14px; resize: none; outline: none;
    font-family: inherit; color: var(--foreground);
    background: var(--secondary);
    min-height: 48px; max-height: 200px;
  }
  .chat-input::placeholder { color: var(--text-tertiary); }
  .chat-input:disabled { opacity: 0.5; }
  .send-btn {
    width: 40px; height: 48px; border-radius: 8px;
    background: var(--primary); color: white; border: none;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .input-hints { display: flex; gap: 6px; margin-top: 8px; }
  .input-hint {
    font-size: 11px; color: var(--text-tertiary); cursor: pointer;
    padding: 2px 8px; border-radius: 4px; background: var(--muted);
  }
  .input-hint:hover { background: var(--accent); color: var(--text-secondary); }

  .replay-btn {
    position: fixed; bottom: 80px; right: 30px;
    padding: 10px 20px; background: var(--primary); color: white;
    border: none; border-radius: var(--radius); font-size: 14px;
    cursor: pointer; z-index: 100;
    box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    font-family: inherit;
  }
  .replay-btn:hover { opacity: 0.9; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes statusSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="icon-sidebar">
  <div class="user-avatar">我<span class="status-dot"></span></div>
  <div class="nav-icon active"><span class="icon">💬</span><span class="label">聊天</span></div>
  <div class="nav-icon"><span class="icon">👤</span><span class="label">设置</span></div>
  <div class="nav-icon"><span class="icon">⚙️</span><span class="label">管理</span></div>
</div>

<div class="conv-list">
  <div class="conv-header">
    <h3>群聊</h3>
    <button class="new-chat-btn">＋</button>
  </div>
  <div class="conv-search"><input type="text" placeholder="搜索对话..."></div>
  <div class="conv-scroll">
    <div class="conv-item active">
      <div class="conv-avatar" style="background:linear-gradient(135deg, var(--agent-orchestrator), var(--primary))">OC</div>
      <div class="conv-info">
        <div class="conv-row">
          <span class="conv-title">登录系统开发</span>
          <span class="conv-time" id="convTime">14:20</span>
        </div>
        <div class="conv-preview" id="convPreview">等待开始...</div>
        <div class="conv-members">
          <div class="member-dot" style="background:var(--agent-orchestrator)">项</div>
          <div class="member-dot" style="background:var(--agent-claude)">前</div>
          <div class="member-dot" style="background:var(--agent-opencode)">审</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="chat-area">
  <div class="chat-header">
    <div class="chat-header-left">
      <h4>登录系统开发</h4>
      <div class="agent-badges">
        <span class="agent-badge badge-orchestrator">项目经理</span>
        <span class="agent-badge badge-claude">前端小助手</span>
        <span class="agent-badge badge-opencode">代码审查员</span>
      </div>
    </div>
    <div id="headerStatus"></div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <div class="input-row">
      <textarea class="chat-input" id="msgInput" placeholder="输入消息... @前端小助手 @代码审查员 @项目经理" rows="1" disabled></textarea>
      <button class="send-btn" id="sendBtn" disabled>➤</button>
    </div>
    <div class="input-hints">
      <span class="input-hint" onclick="insertMention('@前端小助手')">@前端小助手</span>
      <span class="input-hint" onclick="insertMention('@代码审查员')">@代码审查员</span>
      <span class="input-hint" onclick="insertMention('@项目经理')">@项目经理</span>
    </div>
  </div>
</div>

<button class="replay-btn" id="replayBtn" onclick="startReplay()">▶ 播放完整流程</button>

<script>
const msgs = document.getElementById('messages');
let simRunning = false;

function scrollBottom() { msgs.scrollTop = msgs.scrollHeight; }
function setStatus(html) { document.getElementById('headerStatus').innerHTML = html; }
function setPreview(text) { document.getElementById('convPreview').textContent = text; }
function setTime(text) { document.getElementById('convTime').textContent = text; }

function addTimeDivider(text) {
  const d = document.createElement('div');
  d.className = 'time-divider'; d.textContent = text;
  msgs.appendChild(d); scrollBottom();
}

function addMsg(opts) {
  const d = document.createElement('div');
  const agentCls = opts.agentClass ? ` ${opts.agentClass}` : '';
  d.className = `msg ${opts.role}${agentCls}`;
  d.style.animation = 'fadeIn 0.3s ease';

  const avatarBg = opts.role === 'user' ? 'var(--primary)' : opts.color;
  const avatarText = opts.role === 'user' ? '我' : opts.avatar;
  const headerAlign = opts.role === 'user' ? 'justify-content:flex-end' : '';

  let actionsHtml = '';
  if (opts.actions) {
    actionsHtml = `<div class="msg-actions" style="${opts.role==='user'?'justify-content:flex-end':''}">${opts.actions.map(a => `<button class="msg-action-btn">${a}</button>`).join('')}</div>`;
  }

  d.innerHTML = `
    <div class="msg-avatar" style="background:${avatarBg}">${avatarText}</div>
    <div class="msg-body">
      <div class="msg-header" style="${headerAlign}">
        <span class="msg-name ${opts.nameClass||''}">${opts.name}</span>
        ${opts.statusHtml||''}
        <span class="msg-time">${opts.time||''}</span>
      </div>
      <div class="msg-content">${opts.content}</div>
      ${actionsHtml}
    </div>
  `;
  msgs.appendChild(d); scrollBottom();
  return d;
}

function addToolCard(msgEl, header, cmd, result) {
  const body = msgEl.querySelector('.msg-body');
  const c = document.createElement('div'); c.className = 'tool-card';
  c.innerHTML = `<div class="tool-card-header">${header}</div><div class="tool-card-cmd">${cmd}</div>${result ? `<div style="font-size:12px;color:${result.ok?'var(--agent-opencode)':'#EF4444'};margin-top:4px">${result.text}</div>` : ''}`;
  body.appendChild(c); scrollBottom();
}

let coordEl = null;
function openCoordChannel() {
  coordEl = document.createElement('div'); coordEl.className = 'coord-channel';
  coordEl.innerHTML = `
    <div class="coord-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.coord-toggle').textContent = this.nextElementSibling.classList.contains('open') ? '▼ 点击收起' : '▶ 点击展开'">
      <div class="coord-title">🔗 协调通道 <span class="coord-toggle">▶ 点击展开</span></div>
    </div>
    <div class="coord-body"></div>
  `;
  msgs.appendChild(coordEl); scrollBottom();
}

function addCoordRound(roundNum) {
  const body = coordEl.querySelector('.coord-body');
  const round = document.createElement('div'); round.className = 'coord-round';
  round.innerHTML = `<div class="coord-round-label">第 ${roundNum} 轮协调</div>`;
  body.appendChild(round); scrollBottom();
  return round;
}

function addCoordMsg(round, from, fromClass, to, toClass, text) {
  const msg = document.createElement('div'); msg.className = 'coord-msg';
  msg.innerHTML = `<span class="coord-from ${fromClass}">${from}</span> <span class="coord-arrow">→</span> <span class="coord-from ${toClass}">${to}</span><br>${text}`;
  round.appendChild(msg); scrollBottom();
}

function addCoordTyping(round, name, fromClass) {
  const t = document.createElement('div'); t.className = 'coord-typing';
  t.innerHTML = `<span class="coord-from ${fromClass}">${name}</span> 正在思考<span class="dots"><span>●</span><span>●</span><span>●</span></span>`;
  round.appendChild(t); scrollBottom();
  return t;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

const input = document.getElementById('msgInput');
input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

function insertMention(text) { input.value += text + ' '; input.focus(); }

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && !input.disabled) {
    e.preventDefault();
    const text = input.value.trim(); if (!text) return;
    let processed = text;
    processed = processed.replace(/@前端小助手/g, '<span class="mention mention-claude">@前端小助手</span>');
    processed = processed.replace(/@代码审查员/g, '<span class="mention mention-opencode">@代码审查员</span>');
    processed = processed.replace(/@项目经理/g, '<span class="mention mention-orchestrator">@项目经理</span>');
    addMsg({ role:'user', name:'我', content: processed, time:'刚刚', actions:['重新生成'] });
    input.value = ''; input.style.height = 'auto';
    setPreview('我: ' + text.substring(0, 30) + '...');
  }
});
