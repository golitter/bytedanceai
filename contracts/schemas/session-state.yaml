# 会话状态枚举及合法转换表
# 定义 AgentEnd 会话的生命周期状态机
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "session-state.yaml"
title: "SessionState"

definitions:
  SessionState:
    title: "SessionState"
    type: string
    description: "会话状态枚举"
    enum:
      - idle        # 空闲，等待任务
      - running     # 执行中
      - awaiting_review # 等待用户审查 Orchestrator 规划
      - completed   # 正常完成（终态）
      - interrupted # 被中断（终态）
      - error       # 出错（终态）
      - inactive    # 用户手动停用（仅由外部 API 设置）

  SessionStateTransitions:
    title: "SessionStateTransitions"
    type: object
    description: |
      合法的状态转换映射表。
      key 为当前状态，value 为可转换到的状态集合。
      completed / interrupted / error 为终态，不可转换。
    properties:
      idle:
        type: array
        items:
          $ref: "#/definitions/SessionState"
        const:
          - running
        description: "idle → running"
      running:
        type: array
        items:
          $ref: "#/definitions/SessionState"
        const:
          - completed
          - interrupted
          - error
          - awaiting_review
        description: "running → completed / interrupted / error"
      awaiting_review:
        type: array
        items:
          $ref: "#/definitions/SessionState"
        const:
          - running
        description: "awaiting_review → running"
      completed:
        type: array
        items:
          $ref: "#/definitions/SessionState"
        const: []
        description: "终态"
      interrupted:
        type: array
        items:
          $ref: "#/definitions/SessionState"
        const: []
        description: "终态"
      error:
        type: array
        items:
          $ref: "#/definitions/SessionState"
        const: []
        description: "终态"
      inactive:
        type: array
        items:
          $ref: "#/definitions/SessionState"
        const: []
        description: "终态，仅由外部 API 设置"
    required:
      - idle
      - running
      - awaiting_review
      - completed
      - interrupted
      - error
      - inactive
