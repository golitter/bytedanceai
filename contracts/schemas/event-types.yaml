# StreamEvent 事件类型枚举及 StreamEvent 数据结构
# 三端（Python/TypeScript/Go）的类型定义均由此文件生成
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "event-types.yaml"
title: "EventTypes"

definitions:
  EventType:
    title: "EventType"
    type: string
    description: "SSE 流事件类型枚举"
    enum:
      - init                  # 会话初始化事件
      - text                  # 文本内容流式输出
      - tool_call             # 工具调用开始
      - tool_result           # 工具调用结果返回
      - artifact              # 产出物（文件/代码等）
      - planning              # 规划/思考过程
      - plan_review           # Orchestrator 规划审查请求
      - done                  # 流结束
      - error                 # 错误事件
      - runtime_executing     # Agent 开始执行任务
      - runtime_text          # Orchestrator 透传子 Agent 增量文本
      - runtime_completed     # Agent 完成任务
      - coordination_start    # 协调通道开启
      - coordination_message  # 协调消息（项目经理 ↔ Agent）
      - coordination_done     # 协调通道关闭
      - ask_card_start        # Orchestrator 向子 Agent 发起提问
      - ask_card_done         # 子 Agent 回答完成，更新提问卡片状态

  StreamEvent:
    title: "StreamEvent"
    type: object
    description: "SSE 流事件数据结构"
    properties:
      type:
        $ref: "#/definitions/EventType"
        description: "事件类型"
      content:
        type: object
        additionalProperties: true
        default: {}
        description: "事件内容，具体字段随 type 而异"
      timestamp:
        type: number
        description: "Unix 时间戳（秒，含小数）"
    required:
      - type
